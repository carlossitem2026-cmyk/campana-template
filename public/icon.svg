<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8c0b1e"/>
      <stop offset="100%" style="stop-color:#C8102E"/>
    </linearGradient>
  </defs>

  <!-- Fondo rojo redondeado -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Línea decorativa superior -->
  <rect x="60" y="72" width="392" height="3" rx="2" fill="rgba(255,255,255,0.3)"/>

  <!-- Reemplazar por el nombre del candidato -->
  <text x="256" y="220"
    font-family="Arial Black, Impact, sans-serif"
    font-size="148"
    font-weight="900"
    fill="white"
    text-anchor="middle"
    letter-spacing="-2">NOMBRE</text>

  <!-- Reemplazar por el apellido del candidato -->
  <text x="256" y="340"
    font-family="Arial Black, Impact, sans-serif"
    font-size="102"
    font-weight="900"
    fill="white"
    text-anchor="middle"
    letter-spacing="0">APELLIDO</text>

  <!-- Línea divisora -->
  <rect x="80" y="366" width="352" height="2" rx="1" fill="rgba(255,255,255,0.4)"/>

  <!-- LISTA -->
  <text x="148" y="430"
    font-family="Arial Black, sans-serif"
    font-size="44"
    font-weight="900"
    fill="white"
    text-anchor="middle"
    letter-spacing="1">LISTA 1</text>

  <!-- Separador vertical -->
  <rect x="252" y="396" width="2" height="48" rx="1" fill="rgba(255,255,255,0.4)"/>

  <!-- OPCIÓN -->
  <text x="366" y="430"
    font-family="Arial Black, sans-serif"
    font-size="44"
    font-weight="900"
    fill="white"
    text-anchor="middle"
    letter-spacing="1">OPC. 1</text>

  <!-- Línea decorativa inferior -->
  <rect x="60" y="460" width="392" height="3" rx="2" fill="rgba(255,255,255,0.3)"/>
</svg>
