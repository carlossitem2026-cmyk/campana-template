<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8c0b1e"/>
      <stop offset="100%" style="stop-color:#C8102E"/>
    </linearGradient>
  </defs>

  <!-- Fondo rojo redondeado -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Línea decorativa superior -->
  <rect x="60" y="150" width="392" height="3" rx="2" fill="rgba(255,255,255,0.3)"/>

  <!-- LISTA -->
  <text x="148" y="235"
    font-family="Arial Black, sans-serif"
    font-size="38"
    font-weight="900"
    fill="rgba(255,255,255,0.75)"
    text-anchor="middle"
    letter-spacing="2">LISTA</text>
  <text x="148" y="360"
    font-family="Arial Black, Impact, sans-serif"
    font-size="160"
    font-weight="900"
    fill="white"
    text-anchor="middle">1</text>

  <!-- Separador vertical -->
  <rect x="253" y="200" width="3" height="180" rx="1.5" fill="rgba(255,255,255,0.4)"/>

  <!-- OPCIÓN -->
  <text x="364" y="235"
    font-family="Arial Black, sans-serif"
    font-size="38"
    font-weight="900"
    fill="rgba(255,255,255,0.75)"
    text-anchor="middle"
    letter-spacing="2">OPCIÓN</text>
  <text x="364" y="360"
    font-family="Arial Black, Impact, sans-serif"
    font-size="160"
    font-weight="900"
    fill="white"
    text-anchor="middle">1</text>

  <!-- Línea decorativa inferior -->
  <rect x="60" y="410" width="392" height="3" rx="2" fill="rgba(255,255,255,0.3)"/>
</svg>
